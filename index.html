<!DOCTYPE html>

<html>
<head>

  <title>Pratica</title>

</head>
<body>
  <!--DIV DO VOCABULARIO-->

  <div class="list-vocab sanfona-content" id="vocab"></div>
  <br><br>
  <!--DIV DO TEMPO-->

  <div class="list-tempo sanfona-content" id="tempo">
    <div class="flex-column">
      <button class="select" onclick="toggleOn()" id="toggle">Inverter Sinais</button>
      <button class="select" onclick="untoggleOn()" id="untoggle">Desselecionar todos</button>
    </div>
    
  </div>
  <br>
  
  <!---->
  <button id="show-btn">Definir</button>
  <div class="hidden"></div>
  
  <script src="script.js"></script>
