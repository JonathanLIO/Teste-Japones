<!DOCTYPE html>

<html>

<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title>Pratica</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!--DIV DO VOCABULARIO-->
  <button class="sanfona-header" onclick="toggleConteudo(1)">Vocabulario:</button>
  <div class="list-vocab sanfona-content" id="vocab"></div>
  <br><br>
  <!--DIV DO TEMPO-->
  <button class="sanfona-header" onclick="toggleConteudo(2)">Tempos:</button>
  <div class="list-tempo sanfona-content" id="tempo">
    <div class="flex-column">
      <button class="select" onclick="toggleOn()" id="toggle">Inverter Sinais</button>
      <button class="select" onclick="untoggleOn()" id="untoggle">Desselecionar todos</button>
    </div>

  </div>
  <br>

  <!--BOTÃO PARA DEFINIR OS TEMPOS-->
  <button id="show-btn" onclick="Definir()">Definir</button>

  <!--DIV DO QUIZ-->
  <div class="hidden" id="hidden">
    <div class="quiz-container">
      <div class="quiz-card">
        <!--TEMPO DE CONJUGAÇÃO-->
        <div class="verb-tense" id="verb-tense">Pretérito Imperfeito</div>
        <!--VERBO BASE-->
        <div class="base-verb" id="base-verb">Estudar</div>

        <button class="reveal-btn hidden" id="btn-revelar" onclick="revealResposta()">Mostrar Conjugação</button>
        
        <div class="answer-box" id="answer-box">
          <!--VERBO CONJUGAÇÃO-->
          <span class="answer-text" id="answer-text">Eu estudava</span><br>
          <button class="reveal-btn" id="btn-reiniciar" onclick="Carregar()">Gerar proxima palavra</button>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
